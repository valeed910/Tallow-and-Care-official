<!DOCTYPE html>
<html>
<head>
  <title>Login - Tallow & Care</title>
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

    body{ height:100vh; display:flex; justify-content:center; align-items:center; background: linear-gradient(135deg,#fff,#7fb069,#2c5016); background-size:300% 300%; animation: gradientMove 12s ease infinite; }

    @keyframes gradientMove{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

    .login-card{ width:380px; padding:40px; border-radius:20px; backdrop-filter:blur(20px); background:rgba(255,255,255,0.08); box-shadow:0 2px 20px rgba(0,0,0,0.1); color:#ffffff; text-align:center; }

    .login-card h2{ margin-bottom:25px; font-weight:600; letter-spacing:1px; }

    .input-group{ position:relative; margin-bottom:20px; }

    .input-group input{ width:100%; padding:14px 15px; border:none; outline:none; border-radius:10px; background:rgba(255,255,255,0.12); color:#000000; font-size:14px; transition:0.3s ease; }

    .input-group input:focus{ background:rgba(255,255,255,0.2); box-shadow:0 0 0 2px #7fb069; }

    button{ width:100%; padding:14px; border:none; border-radius:12px; background:#5a8441; color:#000000; font-weight:600; font-size:15px; cursor:pointer; transition:0.3s ease; }

    button:hover{ background:#2d7600; transform:translateY(-2px); box-shadow:0 2px 20px rgba(0,0,0,0.1); }

    button.loading{ opacity:0.7; cursor:not-allowed; }

    .error-msg{ margin-top:12px; font-size:13px; color:#ff6b6b; display:none; }

    .register-link{ margin-top:20px; font-size:13px; }

    .register-link a{ color:#2c5016; text-decoration:none; }

    .register-link a:hover{ text-decoration:underline; }

    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Welcome Back</h2>

      <form id="loginForm">
        <div class="input-group">
          <input type="email" id="email" placeholder="Email address" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
        </div>

        <button type="submit" id="loginBtn">Login</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>

      <div class="register-link">
        Don’t have an account? <a href="register.html">Register</a>
      </div>
    </div>

  <script>
    const API = "https://api.tallowandcare.in";

    const form = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorMsg.style.display = "none";
      loginBtn.classList.add("loading");
      loginBtn.textContent = "Logging in...";
      loginBtn.disabled = true;

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Login failed");
        }

        localStorage.setItem("token", data.token);

        // smooth redirect
        document.body.style.opacity = "0";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 400);

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
        loginBtn.classList.remove("loading");
        loginBtn.textContent = "Login";
        loginBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
