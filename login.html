<!DOCTYPE html>
<html>
<head>
  <title>Login - Tallow & Care</title>
  <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* BODY */

body{
min-height:100vh;
display:flex;
color:#1f2933;
}

/* MAIN CONTAINER */

.login-container{
display:flex;
width:100%;
min-height:100vh;
flex-wrap:wrap;
}

/* LEFT SIDE */

.left-side{
flex:1;
min-height:400px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

/* BACKGROUND IMAGE */

.left-side .bg-img{
width:100%;
height:100%;
object-fit:cover;
opacity:0.25;
position:absolute;
}

/* BRAND LOGO */

.brand{
display:flex;
align-items:center;
justify-content:center;
width:100%;
height:100%;
position:relative;
z-index:2;
}

.brand img{
width:220px;
height:auto;
}

/* RIGHT SIDE */

.right-side{
width:420px;
max-width:100%;
display:flex;
align-items:center;
justify-content:center;
padding:50px 40px;
background:#ffffff;
}

/* LOGIN CARD */

.login-box{
width:100%;
max-width:360px;
}

.login-box h2{
font-size:28px;
margin-bottom:6px;
color:#2c5016;
}

.login-box p{
font-size:14px;
color:#6b7280;
margin-bottom:25px;
}

/* INPUT */

.input-group{
margin-bottom:18px;
}

.input-group input{

width:100%;
padding:14px;
border-radius:10px;

border:1px solid #d1d5db;

background:linear-gradient(
145deg,
#ffffff,
#f6faf3
);

color:#111827;
outline:none;
transition:0.3s;
}

.input-group input:focus{

border-color:#7fb069;

box-shadow:0 0 0 2px rgba(127,176,105,0.25);

background:linear-gradient(
145deg,
#ffffff,
#eef6e8
);

}

/* BUTTON */

button{

width:100%;
padding:14px;

border:none;
border-radius:10px;

background:linear-gradient(
135deg,
#7fb069,
#5a8441
);

color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(90,132,65,0.35);

}

button.loading{
opacity:0.6;
cursor:not-allowed;
}

/* ERROR */

.error-msg{
margin-top:12px;
font-size:13px;
color:#e63946;
display:none;
}

/* SIGNUP */

.register-link{
margin-top:18px;
font-size:13px;
color:#6b7280;
}

.register-link a{
color:#5a8441;
text-decoration:none;
font-weight:500;
}

.register-link a:hover{
text-decoration:underline;
}

/* DIVIDER */

.divider{
margin:25px 0;
display:flex;
align-items:center;
font-size:12px;
color:#9ca3af;
}

.divider::before,
.divider::after{
content:"";
flex:1;
height:1px;
background:#e5e7eb;
}

.divider span{
margin:0 10px;
}

/* GOOGLE BUTTON */

.google-btn{

background:#ffffff;
border:1px solid #d1d5db;

padding:13px;
border-radius:10px;

color:#374151;
cursor:pointer;

}

.google-btn:hover{
background:#f9fafb;
}

/* RESPONSIVE */

@media (max-width: 900px) {

  .left-side{
    display:none;
  }

  .right-side{
    width:100%;
    padding:40px 25px;
  }

  .login-container{
    justify-content:center;
  }

}
</style>
  </head>
  <body>
<body>

<div class="login-container">

<!-- LEFT SIDE -->

<div class="left-side">

<img src="/assets/images/Animal Image.jpg" class="bg-img">

<div class="brand">
  <img src="/assets/images/Company_logo.png" class="bg-img">
</div>

</div>


<!-- RIGHT SIDE -->

<div class="right-side">

<div class="login-box">

<h2>Sign in</h2>
<p>Welcome back! Please sign in to continue.</p>

<form id="loginForm">

<div class="input-group">
<input type="email" id="email" placeholder="Email address" required>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit" id="loginBtn">
Continue
</button>

<div class="error-msg" id="errorMsg"></div>

</form>

<div class="register-link">
Don't have an account? <a href="register.html">Sign up</a>
</div>

<div class="divider">
<span>or continue</span>
</div>

<button type="button" class="google-btn">
Continue with Google
</button>

</div>

</div>

</div>

  <script>
document.addEventListener("DOMContentLoaded", () => {

const API = "https://api.tallowandcare.in";

const form = document.getElementById("loginForm");
const loginBtn = document.getElementById("loginBtn");
const errorMsg = document.getElementById("errorMsg");

if(!form) return;

form.addEventListener("submit", async (e) => {

e.preventDefault();

errorMsg.style.display = "none";

loginBtn.classList.add("loading");
loginBtn.textContent = "Logging in...";
loginBtn.disabled = true;

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

try {

const res = await fetch(`${API}/api/auth/login`, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ email, password })
});

const data = await res.json().catch(()=>({}));

if(!res.ok){
throw new Error(data.error || "Invalid email or password");
}

localStorage.setItem("token", data.token);

/* smooth redirect */

document.body.style.transition = "opacity 0.3s";
document.body.style.opacity = "0";

setTimeout(()=>{
window.location.href = "index.html";
},300);

}

catch(err){

errorMsg.textContent = err.message;
errorMsg.style.display = "block";

loginBtn.classList.remove("loading");
loginBtn.textContent = "Continue";
loginBtn.disabled = false;

}

});

});
  </script>

</body>
</html>
