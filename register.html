<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Tallow & Care</title>

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

    body{ height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); background-size:300% 300%; animation:gradientMove 12s ease infinite; }

    @keyframes gradientMove{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

    .register-card{ width:400px; padding:40px; border-radius:20px; backdrop-filter:blur(20px); background:rgba(255,255,255,0.08); box-shadow:0 15px 40px rgba(0,0,0,0.4); color:#fff; text-align:center; }

    .register-card h2{ margin-bottom:25px; font-weight:600; letter-spacing:1px; }

    .input-group{ position:relative; margin-bottom:18px; }

    .input-group input{ width:100%; padding:14px 15px; border:none; outline:none; border-radius:10px; background:rgba(255,255,255,0.12); color:#fff; font-size:14px; transition:0.3s ease; }

    .input-group input:focus{ background:rgba(255,255,255,0.2); box-shadow:0 0 0 2px #00c9a7; }

    .password-strength{ font-size:12px; margin-top:5px; text-align:left; color:#aaa; }

    button{ width:100%; padding:14px; border:none; border-radius:12px; background:#00c9a7; color:#000; font-weight:600; font-size:15px; cursor:pointer; transition:0.3s ease; }

    button:hover{ background:#00e0b8; transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,201,167,0.4); }

    button.loading{ opacity:0.7; cursor:not-allowed; }

    .error-msg{ margin-top:12px; font-size:13px; color:#ff6b6b; display:none; }

    .login-link{ margin-top:20px; font-size:13px; }

    .login-link a{ color:#00e0b8; text-decoration:none; }

    .login-link a:hover{ text-decoration:underline; }
    
  </style>
</head>

<body>

  <div class="register-card">
    <h2>Create Account</h2>

    <form id="registerForm">
      <div class="input-group">
        <input type="text" id="name" placeholder="Full Name" required>
      </div>

      <div class="input-group">
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Password (min 6 characters)" required>
        <div class="password-strength" id="strengthText"></div>
      </div>

      <button type="submit" id="registerBtn">Create Account</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script>
    const API = "https://api.tallowandcare.in";

    const form = document.getElementById("registerForm");
    const registerBtn = document.getElementById("registerBtn");
    const errorMsg = document.getElementById("errorMsg");
    const passwordInput = document.getElementById("password");
    const strengthText = document.getElementById("strengthText");

/* Password strength indicator */
    passwordInput.addEventListener("input", () => {
      const value = passwordInput.value;
      if (value.length < 6) {
        strengthText.textContent = "Weak password";
        strengthText.style.color = "#ff6b6b";
      } else if (value.length < 10) {
        strengthText.textContent = "Medium strength";
        strengthText.style.color = "#f1c40f";
      } else {
        strengthText.textContent = "Strong password";
        strengthText.style.color = "#00e0b8";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorMsg.style.display = "none";
      registerBtn.classList.add("loading");
      registerBtn.textContent = "Creating...";
      registerBtn.disabled = true;

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value.trim();

      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Registration failed");
        }

        localStorage.setItem("token", data.token);

        document.body.style.opacity = "0";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 400);

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
        registerBtn.classList.remove("loading");
        registerBtn.textContent = "Create Account";
        registerBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
